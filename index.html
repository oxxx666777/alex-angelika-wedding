<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Александр & Анжелика | Свадьба</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f7f3ef;
      color: #2b2b2b;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      max-width: 600px;
      padding: 40px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      margin-bottom: 10px;
    }

    h2 {
      font-weight: 400;
      margin-bottom: 30px;
      color: #666;
    }

    .btn {
      display: inline-block;
      padding: 14px 28px;
      margin: 10px;
      border: 1px solid #2b2b2b;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #2b2b2b;
      color: white;
    }

    .music-note {
      margin-top: 20px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Александр & Анжелика</h1>
    <h2>26 сентября 2026</h2>

    <p>Добро пожаловать на наше свадебное приглашение</p>

    <button class="btn">▶ Включить музыку</button>
    <button class="btn">💌 Открыть приглашение</button>

    <div class="music-note">
      Для полного погружения рекомендуем включить музыку
    </div>
  </div>

</body>
</html>
